<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Movimentação</title>
    <link rel="stylesheet" href="movStyle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#" id="logout">Sair</a></li>
            <li><a href="../home/home.html">Ver Estoque</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="content">
            <form id="form">
                <h1>Adicionar Movimentação</h1>

                <label for="tipo">Tipo de Entrada:</label>
                <select id="tipo">
                    <option value="in" style="color: green;">Entrada (+)</option>
                    <option value="out" style="color: red;">Saída (-)</option>
                </select>

                <label for="qnt">Quantidade Movimentada:</label>
                <input type="number" id="qnt" placeholder="0,00">

                <label for="id_product">Nome do Produto Movimentado:</label>
                <input type="text" id="id_product" readonly>

                <label for="id_user">Id do Autor da Movimentação:</label>
                <input type="number" id="id_user" readonly>

                <label for="dateregister">Data do Registro da Movimentação:</label>
                <input type="date" id="dateregister" readonly>

                <label for="datemov">Data da Movimentação:</label>
                <input type="date" id="datemov">

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
<script src="movScript.js"></script>
</html>
