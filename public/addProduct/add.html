<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="addStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#" id="logout">Sair</a></li>
            <li><a href="../home/home.html">Ver Estoque</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="content">
            <h1>Adicionar Produto</h1>
            <form id="form">
                <label for="nome">Nome do Produto:</label>
                <input type="text" id="nome" placeholder="Nome" required>

                <label for="codigo">Código do Produto:</label>
                <input type="text" name="codigo" id="codigo" placeholder="Código" required>

                <label for="unidades">Unidade de Medida do Produto:</label>
                <select id="unidades" required>
                    <option value="m">Metros(m)</option>
                    <option value="m2">Metros quadrados(m²)</option>
                    <option value="l">Litros(l)</option>
                    <option value="u">Unidades</option>
                    <option value="g">Grama(g)</option>
                    <option value="kg">Kilograma(kg)</option>
                </select>

                <label for="preco">Preço de Venda do Produto:</label>
                <input type="number" id="preco" step="0.01" placeholder="Preço" required>

                <label for="custo">Custo do Produto:</label>
                <input type="number" id="custo" step="0.01" placeholder="Custo" required>

                <button type="submit">Adicionar</button>
            </form>
        </div>
    </div>
</body>
<script src="addScript.js"></script>
</html>
